<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TOEIC 頻出500語チェック</title>
<style>
:root{--bg:#101322;--card:#191e34;--line:#343d67;--text:#f8f9ff;--muted:#b6bdd8;--accent:#8978ff;--good:#4bd39a;--bad:#ff7484}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:linear-gradient(180deg,#0d1020,#171b30);color:var(--text);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
main{max-width:760px;margin:auto;padding:20px}
h1{font-size:clamp(28px,7vw,44px);margin:8px 0}
p{color:var(--muted);line-height:1.65}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 16px 40px rgba(0,0,0,.22)}
.buttons{display:grid;gap:10px}
button{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px;background:#252d50;color:var(--text);font-size:16px;font-weight:750}
button.primary{background:var(--accent);border-color:transparent}
button:disabled{opacity:.55}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{text-align:center;background:#11162a;border-radius:13px;padding:11px}
.stat b{display:block;font-size:23px} .stat span{color:var(--muted);font-size:12px}
.hidden{display:none}
.word{font-size:clamp(38px,10vw,64px);font-weight:900;text-align:center;margin:22px 0}
.choice{text-align:left;background:#11162a}
.choice.correct{background:rgba(75,211,154,.16);border-color:var(--good)}
.choice.wrong{background:rgba(255,116,132,.16);border-color:var(--bad)}
.feedback{min-height:32px;margin:14px 0;font-weight:800}
.good{color:var(--good)} .bad{color:var(--bad)}
.progress{height:10px;background:#0e1223;border-radius:999px;overflow:hidden}
.bar{height:100%;background:var(--accent);width:0}
.topline{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:10px}
.note{font-size:13px}
</style>
</head>
<body>
<main>
<h1>TOEIC 頻出500語チェック</h1>
<p>500語を確認し、間違えた単語だけを自動保存。終わったら、その苦手だけでもう一周できます。</p>

<section id="home" class="card">
  <div class="stats">
    <div class="stat"><b>500</b><span>収録語</span></div>
    <div class="stat"><b id="missedCount">0</b><span>苦手語</span></div>
    <div class="stat"><b id="lastScore">―</b><span>直近正答率</span></div>
  </div>
  <div class="buttons" style="margin-top:14px">
    <button id="startAll" class="primary">頻出500語テストを始める</button>
    <button id="startMissed">間違えた単語だけ再テスト</button>
    <button id="clearMissed">苦手記録をリセット</button>
  </div>
  <p class="note">途中で画面を閉じても、間違えた単語はこの端末内に保存されます。</p>
</section>

<section id="quiz" class="card hidden">
  <div class="topline"><span id="modeLabel"></span><span id="counter"></span></div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="word" class="word"></div>
  <div id="choices" class="buttons"></div>
  <div id="feedback" class="feedback"></div>
  <button id="next" class="primary hidden">次へ</button>
  <button id="quit" style="margin-top:10px">いったん終了</button>
</section>

<section id="result" class="card hidden">
  <h2>結果</h2>
  <p id="resultText"></p>
  <div class="buttons">
    <button id="retryMissed" class="primary">間違えた単語だけ再テスト</button>
    <button id="backHome">最初の画面へ</button>
  </div>
</section>
</main>

その他"}, {"en": "toward", "ja": "～の方へ", "cat": "副詞・その他"}, {"en": "against", "ja": "～に反対して", "cat": "副詞・その他"}, {"en": "according", "ja": "一致して", "cat": "副詞・その他"}, {"en": "regarding", "ja": "～に関して", "cat": "副詞・その他"}, {"en": "despite", "ja": "～にもかかわらず", "cat": "副詞・その他"}, {"en": "besides", "ja": "～に加えて", "cat": "副詞・その他"}, {"en": "except", "ja": "～を除いて", "cat": "副詞・その他"}, {"en": "per", "ja": "～につき", "cat": "副詞・その他"}, {"en": "via", "ja": "～を経由して", "cat": "副詞・その他"}];
const MISSED_KEY="toeic500_missed_only_v1";
const SCORE_KEY="toeic500_last_score_v1";

let session=[], index=0, correct=0, answered=false, mode="all";

const $=id=>document.getElementById(id);
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function getMissed(){
  try{return JSON.parse(localStorage.getItem(MISSED_KEY)||"[]")}catch(e){return []}
}
function setMissed(ids){
  localStorage.setItem(MISSED_KEY,JSON.stringify([...new Set(ids)]));
  updateHome();
}
function updateHome(){
  $("missedCount").textContent=getMissed().length;
  $("lastScore").textContent=localStorage.getItem(SCORE_KEY)||"―";
  $("startMissed").disabled=getMissed().length===0;
  $("retryMissed").disabled=getMissed().length===0;
}
function showOnly(id){
  ["home","quiz","result"].forEach(x=>$(x).classList.toggle("hidden",x!==id));
}
function start(which){
  mode=which;
  const indexed=DATA.map((w,id)=>({...w,id}));
  session=which==="missed" ? indexed.filter(w=>getMissed().includes(w.id)) : indexed;
  if(!session.length){alert("再テストする苦手単語がありません。");return}
  session=shuffle(session);
  index=0; correct=0; answered=false;
  $("modeLabel").textContent=which==="all"?"頻出500語":"苦手語だけ";
  showOnly("quiz");
  renderQuestion();
}
function choicesFor(q){
  const pool=shuffle(DATA.filter(w=>w.ja!==q.ja)).slice(0,3).map(w=>w.ja);
  return shuffle([q.ja,...pool]);
}
function renderQuestion(){
  answered=false;
  const q=session[index];
  $("counter").textContent=`${index+1} / ${session.length}`;
  $("bar").style.width=`${index/session.length*100}%`;
  $("word").textContent=q.en;
  $("feedback").textContent="";
  $("feedback").className="feedback";
  $("next").classList.add("hidden");
  $("choices").innerHTML="";
  choicesFor(q).forEach(text=>{
    const b=document.createElement("button");
    b.className="choice";
    b.textContent=text;
    b.onclick=()=>answer(b,text,q);
    $("choices").appendChild(b);
  });
}
function answer(button,selected,q){
  if(answered)return;
  answered=true;
  [...document.querySelectorAll(".choice")].forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.ja)b.classList.add("correct");
  });
  let missed=getMissed();
  if(selected===q.ja){
    correct++;
    $("feedback").textContent=`正解　${q.en} = ${q.ja}`;
    $("feedback").className="feedback good";
    if(mode==="missed") missed=missed.filter(id=>id!==q.id);
  }else{
    button.classList.add("wrong");
    $("feedback").textContent=`不正解　${q.en} = ${q.ja}`;
    $("feedback").className="feedback bad";
    missed.push(q.id);
  }
  setMissed(missed);
  $("next").classList.remove("hidden");
}
function next(){
  index++;
  if(index>=session.length) return finish();
  renderQuestion();
}
function finish(){
  const pct=Math.round(correct/session.length*100);
  localStorage.setItem(SCORE_KEY,pct+"%");
  $("resultText").textContent=`${session.length}問中 ${correct}問正解（${pct}%）。現在の苦手単語は${getMissed().length}語です。`;
  updateHome();
  showOnly("result");
}
$("startAll").onclick=()=>start("all");
$("startMissed").onclick=()=>start("missed");
$("retryMissed").onclick=()=>start("missed");
$("next").onclick=next;
$("quit").onclick=()=>{updateHome();showOnly("home")};
$("backHome").onclick=()=>{updateHome();showOnly("home")};
$("clearMissed").onclick=()=>{
  if(confirm("間違えた単語の記録をすべて消しますか？")){
    localStorage.removeItem(MISSED_KEY);
    localStorage.removeItem(SCORE_KEY);
    updateHome();
  }
};
updateHome();
